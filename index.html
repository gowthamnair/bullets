<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bullets</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Roboto:wght@300;400;500&family=Montserrat:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --radius-lg: 18px;
            --radius-md: 14px;
            --radius-sm: 8px;
            --blur: 16px;
            --saturate: 140%;
            --bg-base: #0F1115;
            --bg-mesh: radial-gradient(circle at 50% 0%, #1a1d24 0%, #0F1115 60%);
            --glass-panel: rgba(255, 255, 255, 0.03);
            --glass-overlay: rgba(15, 17, 21, 0.85);
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --glass-highlight: inset 0 1px 0 rgba(255, 255, 255, 0.05);
            --text-primary: #f0f0f0;
            --text-secondary: #8a8d93;
            --text-placeholder: #5a5d63;
            --accent: #ffffff;
            --accent-fg: #000000;
            --accent-glow: rgba(255, 255, 255, 0.1);
            --shadow-soft: 0 12px 32px rgba(0, 0, 0, 0.3);
            --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.4);
            --item-hover: rgba(255, 255, 255, 0.04);
            --danger: #ff453a;
            --danger-bg: rgba(255, 69, 58, 0.1);
            --spacing-unit: 24px;
            --success-border: #4ade80;
        }

        [data-theme="snow"] {
            --bg-base: #F6F6F7;
            --bg-mesh: radial-gradient(circle at 50% 0%, #ffffff 0%, #F6F6F7 60%);
            --glass-panel: rgba(255, 255, 255, 0.65);
            --glass-overlay: rgba(246, 246, 247, 0.85);
            --border: rgba(0, 0, 0, 0.06);
            --text-primary: #1C1C1E;
            --text-secondary: #6e6e73;
            --accent: #1C1C1E;
            --accent-fg: #ffffff;
            --success-border: #16a34a;
        }
        [data-theme="forest"] {
            --bg-base: #09120D;
            --bg-mesh: radial-gradient(circle at 50% 0%, #13241A 0%, #09120D 60%);
            --glass-panel: rgba(255, 255, 255, 0.03);
            --text-primary: #e8f0ec;
            --text-secondary: #7e9386;
            --accent: #4ade80;
            --accent-fg: #000000;
        }
        [data-theme="ocean"] {
            --bg-base: #080D14;
            --bg-mesh: radial-gradient(circle at 50% 0%, #121D2A 0%, #080D14 60%);
            --glass-panel: rgba(255, 255, 255, 0.03);
            --text-primary: #e6eff8;
            --text-secondary: #7a8d9e;
            --accent: #38bdf8;
            --accent-fg: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font-main); background: var(--bg-base); background-image: var(--bg-mesh); color: var(--text-primary); height: 100vh; display: flex; overflow: hidden; }

        .app-container { display: flex; width: 100vw; height: 100vh; z-index: 1; position: relative; }

        .sidebar {
            width: 280px; flex-shrink: 0; background: var(--glass-panel); backdrop-filter: blur(var(--blur)) saturate(var(--saturate));
            border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: var(--spacing-unit) 16px;
            box-shadow: var(--glass-highlight); z-index: 100; transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .brand { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: var(--spacing-unit); padding: 0 8px; display: flex; justify-content: space-between; align-items: center; }
        .nav-section { flex-grow: 1; overflow-y: auto; padding-right: 4px; }
        .segmented-control { display: flex; background: rgba(0,0,0,0.2); border-radius: var(--radius-sm); padding: 4px; gap: 4px; margin-bottom: 12px; }
        .segment-btn { flex: 1; background: transparent; border: none; color: var(--text-secondary); padding: 10px 0; border-radius: 4px; font-size: 0.75rem; font-weight: 600; cursor: pointer; }
        .segment-btn.active { background: var(--glass-panel); color: var(--text-primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        .folder-group { margin-bottom: 12px; }
        .folder-header { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-radius: var(--radius-sm); color: var(--text-secondary); font-size: 0.8rem; font-weight: 500; cursor: pointer; }
        .folder-header:hover { color: var(--text-primary); background: var(--item-hover); }
        .note-list { padding-left: 8px; margin-top: 4px; display: none; flex-direction: column; gap: 2px; }
        .folder-group.active .note-list { display: flex; }
        .note-item { padding: 10px 12px; border-radius: var(--radius-sm); font-size: 0.85rem; color: var(--text-secondary); cursor: pointer; display: flex; justify-content: space-between; align-items: center; position: relative; border: 1px solid transparent; }
        .note-item.active { background: var(--accent-glow); color: var(--text-primary); font-weight: 500; }

        .main-view { flex-grow: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; background: transparent; }

        .editor-container { flex-grow: 1; display: none; flex-direction: column; height: 100%; }
        .editor-container.active { display: flex; }
        .floating-toolbar { position: absolute; top: var(--spacing-unit); right: var(--spacing-unit); background: var(--glass-panel); backdrop-filter: blur(var(--blur)); border: 1px solid var(--border); border-radius: 30px; padding: 6px 16px; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow-float); z-index: 20; opacity: 0.3; transition: opacity 0.3s; }
        .editor-container:hover .floating-toolbar, .floating-toolbar:hover { opacity: 1; }
        .tool-btn { background: transparent; border: none; color: var(--text-secondary); padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; font-weight: 500; }
        .tool-btn:hover { background: var(--item-hover); color: var(--text-primary); }
        .toolbar-label { font-size: 0.6rem; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; }
        .floating-toolbar select { background: transparent; border: none; color: var(--text-secondary); font-size: 0.8rem; cursor: pointer; outline: none; -webkit-appearance: none; font-family: inherit; }

        .editor-scroll-area { flex-grow: 1; overflow-y: auto; padding: 100px 5% var(--spacing-unit); display: flex; justify-content: center; }
        .page-content { width: 100%; max-width: 800px; display: flex; flex-direction: column; padding-bottom: 100px; }
        .title-input { width: 100%; background: transparent; border: none; color: var(--text-primary); font-size: 2.2rem; font-weight: 600; margin-bottom: 1.5rem; outline: none; font-family: inherit; line-height: 1.4; padding: 10px 0; }
        .title-input[contenteditable]:empty::before { content: attr(placeholder); color: var(--text-placeholder); pointer-events: none; }
        #editor { flex-grow: 1; outline: none; font-size: 1.05rem; line-height: 1.7; color: var(--text-primary); min-height: 60vh; }

        /* Calendar View */
        .calendar-container { display: none; flex-direction: column; height: 100%; padding: var(--spacing-unit); overflow-y: auto; }
        .calendar-container.active { display: flex; }
        
        .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .calendar-title { font-size: 1.5rem; font-weight: 600; }
        .calendar-nav { display: flex; gap: 8px; }

        .calendar-stats { display: flex; align-items: center; gap: 20px; margin-bottom: var(--spacing-unit); background: var(--glass-panel); padding: 16px 24px; border-radius: var(--radius-md); border: 1px solid var(--border); }
        .stat-group { display: flex; gap: 20px; flex-grow: 1; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-val { font-size: 1.2rem; font-weight: 600; color: var(--text-primary); }
        .stat-lbl { font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; flex-grow: 1; min-height: 600px; }
        .calendar-day-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); text-align: center; padding-bottom: 8px; }
        
        .calendar-day { background: var(--glass-panel); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px; display: flex; flex-direction: column; gap: 8px; cursor: pointer; transition: all 0.2s; position: relative; min-height: 120px; }
        .calendar-day:hover { border-color: var(--border-hover); background: var(--item-hover); transform: translateY(-2px); }
        .calendar-day.today { border-color: var(--accent); }
        .calendar-day.all-done { border-color: var(--success-border); box-shadow: inset 0 0 10px rgba(74, 222, 128, 0.1); }
        .calendar-day.other-month { opacity: 0.15; pointer-events: none; }
        .day-num { font-size: 1rem; font-weight: 600; color: var(--text-secondary); }
        .day-tasks { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; gap: 4px; }
        .task-indicator { font-size: 0.65rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.05); }
        .task-indicator.done { text-decoration: line-through; opacity: 0.4; }

        .modal-overlay { position: fixed; inset: 0; background: var(--glass-overlay); backdrop-filter: blur(var(--blur)); z-index: 1000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.2s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: var(--bg-base); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; width: 100%; max-width: 420px; box-shadow: var(--shadow-float); }
        .input-text { width: 100%; background: rgba(0,0,0,0.1); border: 1px solid var(--border); color: var(--text-primary); padding: 12px; border-radius: var(--radius-sm); font-size: 0.9rem; outline: none; margin-bottom: 16px; }
        .btn-primary { background: var(--accent); color: var(--accent-fg); border: none; padding: 12px 16px; border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 600; cursor: pointer; width: 100%; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); padding: 10px 16px; border-radius: var(--radius-sm); font-size: 0.85rem; cursor: pointer; width: 100%; }

        .todo-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding: 8px; border-radius: 8px; background: var(--item-hover); }
        .todo-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .todo-item .task-text { flex-grow: 1; font-size: 0.9rem; }
        .todo-item.done .task-text { text-decoration: line-through; opacity: 0.5; }

        .mobile-header { display: none; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--glass-panel); backdrop-filter: blur(var(--blur)); border-bottom: 1px solid var(--border); z-index: 110; }
        .mobile-header button { background: transparent; border: none; color: var(--text-primary); font-size: 1.5rem; }

        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); width: 85%; }
            .sidebar.open { transform: translateX(0); }
            .calendar-grid { grid-template-columns: repeat(2, 1fr); }
            .calendar-day-label { display: none; }
            .floating-toolbar { bottom: 20px; top: auto; right: 50%; transform: translateX(50%); width: 90%; justify-content: center; opacity: 1; flex-wrap: wrap; height: auto; padding: 12px; border-radius: 20px; }
            .stat-group { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body data-theme="midnight" onclick="closeAllMenus(event)">

    <div class="mobile-header">
        <button onclick="toggleSidebar(event)">☰</button>
        <div style="font-weight: 600; letter-spacing: 0.1em; font-size: 0.9rem;">BULLETS</div>
        <div style="width: 24px;"></div>
    </div>

    <div class="modal-overlay" id="onboarding">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-title" style="font-weight: 600; margin-bottom: 20px; font-size: 1.2rem;">Workspace Init</div>
            <input type="text" id="user-name" class="input-text" placeholder="Executive Alias" autocomplete="off">
            <button class="btn-primary" onclick="saveUser()">Authenticate</button>
        </div>
    </div>

    <div class="modal-overlay" id="folder-modal" onclick="closeModal('folder-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-title" style="font-weight: 600; margin-bottom: 20px;">New Directory</div>
            <input type="text" id="folder-name" class="input-text" placeholder="Directory Name" autocomplete="off">
            <button class="btn-primary" onclick="confirmCreateFolder()" style="margin-bottom: 8px;">Create</button>
            <button class="btn-outline" onclick="closeModal('folder-modal')">Cancel</button>
        </div>
    </div>

    <div class="modal-overlay" id="todo-modal" onclick="closeModal('todo-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-title" id="todo-date-title" style="font-weight: 600; margin-bottom: 20px;">Tasks</div>
            <div id="todo-list-container" style="max-height: 350px; overflow-y: auto; margin-bottom: 20px; padding-right: 5px;"></div>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="new-task-input" class="input-text" placeholder="Action item..." style="margin-bottom: 0;">
                <button class="btn-primary" onclick="addTask()" style="width: auto;">Add</button>
            </div>
            <button class="btn-outline" onclick="closeModal('todo-modal')" style="margin-top: 20px;">Close</button>
        </div>
    </div>

    <div class="app-container">
        <nav class="sidebar" id="sidebar" onclick="event.stopPropagation()">
            <div class="brand">
                <span>Bullets</span>
                <button class="tool-btn" id="folder-add-btn" onclick="openModal('folder-modal')" style="padding: 4px;">+</button>
            </div>
            
            <div class="nav-section" id="nav-section"></div>

            <div style="margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border);">
                <div class="segmented-control">
                    <button class="segment-btn" id="mode-quick" onclick="changeMode('quick')">Quick</button>
                    <button class="segment-btn" id="mode-standard" onclick="changeMode('standard')">Standard</button>
                    <button class="segment-btn" id="mode-todo" onclick="changeMode('todo')">To-Do</button>
                </div>
                <select id="theme-selector" class="input-text" onchange="changeTheme(this.value)" style="height: 38px; -webkit-appearance: none; margin-bottom: 12px;">
                    <option value="midnight">Midnight (Dark)</option>
                    <option value="snow">Snow (Light)</option>
                    <option value="forest">Forest</option>
                    <option value="ocean">Ocean</option>
                </select>
                
                <div class="sidebar-footer">
                    <span class="user-tag" id="user-display">ID: ---</span>
                    <button class="tool-btn" style="font-size: 0.7rem;" onclick="switchUser()">SWITCH</button>
                </div>
            </div>
        </nav>

        <main class="main-view">
            <div class="editor-container" id="editor-view">
                <div class="floating-toolbar" id="toolbar">
                    <span class="tool-advanced toolbar-label">Font</span>
                    <select id="font-selector" class="tool-advanced" onchange="changeFont(this.value)">
                        <option value="'Inter', sans-serif">Inter</option>
                        <option value="'Roboto', sans-serif">Roboto</option>
                        <option value="'Montserrat', sans-serif">Montserrat</option>
                        <option value="'Fira Code', monospace">Fira Code</option>
                    </select>
                    <div class="tool-advanced" style="width: 1px; height: 16px; background: var(--border);"></div>
                    <span class="tool-advanced toolbar-label">Type</span>
                    <button class="tool-btn tool-advanced" onclick="execCmd('insertUnorderedList')">• Dot</button>
                    <button class="tool-btn tool-advanced" onclick="execCmd('bold')"><b>B</b></button>
                    <div style="width: 1px; height: 16px; background: var(--border);"></div>
                    <button class="tool-btn" onclick="copyNotes()">Copy</button>
                    <button class="tool-btn tool-advanced" onclick="downloadImage()">Export</button>
                    <button class="tool-btn tool-advanced" onclick="exportToOutlook()">Outlook</button>
                </div>

                <div class="editor-scroll-area" id="capture-area">
                    <div class="page-content">
                        <div id="note-title" class="title-input" contenteditable="true" placeholder="Untitled Document" spellcheck="false"></div>
                        <div id="editor" contenteditable="true" spellcheck="false"></div>
                    </div>
                </div>
            </div>

            <div class="calendar-container" id="calendar-view">
                <div class="calendar-header">
                    <div class="calendar-title" id="calendar-month-year">Month Year</div>
                    <div class="calendar-nav">
                        <button class="tool-btn" onclick="moveMonth(-1)">←</button>
                        <button class="tool-btn" onclick="moveMonth(1)">→</button>
                    </div>
                </div>
                <div class="calendar-stats">
                    <div class="stat-group">
                        <div class="stat-item"><span class="stat-val" id="stat-done">0</span><span class="stat-lbl">Done</span></div>
                        <div class="stat-item"><span class="stat-val" id="stat-todo">0</span><span class="stat-lbl">To-Do</span></div>
                        <div class="stat-item"><span class="stat-val" id="stat-progress">0%</span><span class="stat-lbl">Progress</span></div>
                    </div>
                    <select id="stat-range" class="input-text" onchange="renderCalendar()" style="width: auto; margin-bottom: 0; padding: 6px 12px; font-size: 0.75rem;">
                        <option value="day">Daily</option>
                        <option value="month" selected>Monthly</option>
                        <option value="year">Yearly</option>
                    </select>
                </div>
                <div class="calendar-grid" id="calendar-grid"></div>
            </div>
        </main>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const titleEl = document.getElementById('note-title');
        const navSection = document.getElementById('nav-section');
        let notes = JSON.parse(localStorage.getItem('bullets_notes')) || [];
        let folders = JSON.parse(localStorage.getItem('bullets_folders')) || [{id: 'default', name: 'Records'}];
        let todos = JSON.parse(localStorage.getItem('bullets_todos')) || {};
        
        let currentNoteId = null;
        let currentFolderId = localStorage.getItem('bullets_current_folder') || 'default';
        let currentMode = 'standard';
        let selectedDateKey = null;
        let viewDate = new Date();

        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('app_user'));
            const savedMode = localStorage.getItem('bullets_mode') || 'standard';
            const savedTheme = localStorage.getItem('bullets_theme') || 'midnight';
            const savedFont = localStorage.getItem('bullets_font') || "'Inter', sans-serif";
            
            document.body.setAttribute('data-theme', savedTheme);
            document.getElementById('theme-selector').value = savedTheme;
            document.documentElement.style.setProperty('--font-main', savedFont);
            document.getElementById('font-selector').value = savedFont;

            if (!user) openModal('onboarding');
            else {
                document.getElementById('user-display').innerText = 'ID: ' + user.name.toUpperCase();
                initSystem();
                changeMode(savedMode, true);
            }
        };

        window.toggleSidebar = (e) => { e.stopPropagation(); document.getElementById('sidebar').classList.toggle('open'); };
        window.closeAllMenus = () => { document.getElementById('sidebar').classList.remove('open'); document.querySelectorAll('.context-menu').forEach(m=>m.classList.remove('show')); };

        window.changeMode = (mode, isInit = false) => {
            currentMode = mode;
            localStorage.setItem('bullets_mode', mode);
            document.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`mode-${mode}`).classList.add('active');

            if (!isInit) {
                const defaults = { quick: 'midnight', standard: 'forest', todo: 'ocean' };
                changeTheme(defaults[mode]);
                document.getElementById('theme-selector').value = defaults[mode];
            }

            const adv = document.querySelectorAll('.tool-advanced');
            const nav = document.getElementById('nav-section');
            const add = document.getElementById('folder-add-btn');
            const eView = document.getElementById('editor-view');
            const cView = document.getElementById('calendar-view');

            if (mode === 'todo') {
                eView.classList.remove('active');
                cView.classList.add('active');
                renderCalendar();
            } else {
                cView.classList.remove('active');
                eView.classList.add('active');
                if (mode === 'quick') {
                    nav.style.display = 'none'; add.style.display = 'none';
                    adv.forEach(el => el.style.display = 'none');
                    loadQuickNote();
                } else {
                    nav.style.display = 'block'; add.style.display = ''; adv.forEach(el => el.style.display = '');
                    resumeStandard();
                }
            }
            closeAllMenus();
        };

        function loadQuickNote() {
            let note = notes.find(n => n.id === 'quick_scratchpad');
            if (!note) { note = { id: 'quick_scratchpad', folderId: 'hidden', title: '', content: '<ul><li><br></li></ul>' }; notes.push(note); saveState(); }
            loadNoteData(note.id);
        }

        function resumeStandard() {
            const active = notes.filter(n => n.folderId === currentFolderId && n.id !== 'quick_scratchpad');
            if (active.length > 0) loadNoteData(active[0].id);
            else createNewNote(currentFolderId);
            renderNavigation();
        }

        // --- CALENDAR LOGIC ---
        window.moveMonth = (dir) => {
            viewDate.setMonth(viewDate.getMonth() + dir);
            renderCalendar();
        };

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('calendar-month-year').innerText = `${monthNames[viewDate.getMonth()]} ${viewDate.getFullYear()}`;

            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            days.forEach(day => {
                const dEl = document.createElement('div');
                dEl.className = 'calendar-day-label';
                dEl.innerText = day;
                grid.appendChild(dEl);
            });

            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const firstDay = (new Date(year, month, 1).getDay() + 6) % 7; // Align Mon-Sun
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'calendar-day other-month';
                grid.appendChild(empty);
            }

            let doneCount = 0, todoCount = 0;
            const range = document.getElementById('stat-range').value;
            const now = new Date();
            const todayKey = `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;

            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = `${year}-${month + 1}-${d}`;
                const dayEl = document.createElement('div');
                dayEl.className = 'calendar-day';
                if (dateKey === todayKey) dayEl.classList.add('today');

                const dayTasks = todos[dateKey] || [];
                const allDone = dayTasks.length > 0 && dayTasks.every(t => t.done);
                if (allDone) dayEl.classList.add('all-done');

                dayEl.onclick = () => openTodoModal(dateKey);

                let taskHtml = '';
                dayTasks.slice(0, 3).forEach(t => {
                    taskHtml += `<div class="task-indicator ${t.done?'done':''}">${t.done?'✓ ':''} ${t.text}</div>`;
                });
                if(dayTasks.length > 3) taskHtml += `<div style="font-size:0.55rem; opacity:0.5; padding-left:6px;">+ ${dayTasks.length-3} more</div>`;

                dayEl.innerHTML = `<div class="day-num">${d}</div><div class="day-tasks">${taskHtml}</div>`;
                grid.appendChild(dayEl);
            }

            // Stats calculation based on range
            Object.keys(todos).forEach(key => {
                const [y, m, d] = key.split('-').map(Number);
                let match = false;
                if (range === 'day') match = key === todayKey;
                else if (range === 'month') match = y === year && m === (month + 1);
                else if (range === 'year') match = y === year;

                if (match) {
                    todos[key].forEach(t => { if(t.done) doneCount++; else todoCount++; });
                }
            });

            document.getElementById('stat-done').innerText = doneCount;
            document.getElementById('stat-todo').innerText = todoCount;
            const total = doneCount + todoCount;
            const prog = total === 0 ? 0 : Math.round((doneCount/total)*100);
            document.getElementById('stat-progress').innerText = `${prog}% (${doneCount}/${total})`;
        }

        window.openTodoModal = (dateKey) => {
            selectedDateKey = dateKey;
            document.getElementById('todo-date-title').innerText = `Schedule: ${dateKey}`;
            renderTodoList();
            openModal('todo-modal');
        };

        function renderTodoList() {
            const container = document.getElementById('todo-list-container');
            container.innerHTML = '';
            const list = todos[selectedDateKey] || [];
            list.forEach((t, idx) => {
                const div = document.createElement('div');
                div.className = `todo-item ${t.done?'done':''}`;
                div.innerHTML = `
                    <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${idx})">
                    <span class="task-text">${t.text}</span>
                    <button class="tool-btn" onclick="removeTask(${idx})" style="color:var(--danger);">✕</button>
                `;
                container.appendChild(div);
            });
        }

        window.addTask = () => {
            const input = document.getElementById('new-task-input');
            const text = input.value.trim();
            if(!text) return;
            if(!todos[selectedDateKey]) todos[selectedDateKey] = [];
            todos[selectedDateKey].push({text, done: false});
            input.value = '';
            saveTodoState();
        };

        window.toggleTask = (idx) => { todos[selectedDateKey][idx].done = !todos[selectedDateKey][idx].done; saveTodoState(); };
        window.removeTask = (idx) => { todos[selectedDateKey].splice(idx, 1); saveTodoState(); };
        function saveTodoState() { localStorage.setItem('bullets_todos', JSON.stringify(todos)); renderTodoList(); renderCalendar(); }

        // --- EDITOR CORE ---
        window.execCmd = (cmd, val = null) => { document.execCommand(cmd, false, val); editor.focus(); autoSave(); };
        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                document.execCommand(e.shiftKey ? 'outdent' : 'indent', false, null);
                autoSave();
            }
        });

        function getFallback() { return `Bullets-${new Date().getTime()}`; }
        window.copyNotes = () => {
            const t = titleEl.innerText.trim() || getFallback();
            navigator.clipboard.writeText(`${t}\n\n${editor.innerText}`);
        };

        window.downloadImage = async () => {
            const area = document.getElementById('capture-area');
            const colors = { midnight: '#0F1115', snow: '#F6F6F7', forest: '#09120D', ocean: '#080D14' };
            const oldScroll = area.scrollTop;
            area.scrollTop = 0;
            const canvas = await html2canvas(area, { backgroundColor: colors[document.body.getAttribute('data-theme')], scale: 2 });
            const link = document.createElement('a');
            link.download = `${titleEl.innerText.trim() || getFallback()}.png`;
            link.href = canvas.toDataURL('image/png'); link.click();
            area.scrollTop = oldScroll;
        };

        window.exportToOutlook = () => {
            const title = titleEl.innerText.trim() || getFallback();
            const body = editor.innerText;
            const emlContent = `Subject: ${title}\nContent-Type: text/plain; charset=utf-8\n\n${body}`;
            const blob = new Blob([emlContent], { type: 'message/rfc822' });
            const link = document.createElement('a');
            link.download = `${title}.eml`;
            link.href = window.URL.createObjectURL(blob);
            link.click();
        };

        // --- DATA & NAV ---
        function initSystem() { if(!folders.find(f=>f.id==='default')) folders.unshift({id:'default', name:'Records'}); renderNavigation(); }
        function saveState() { localStorage.setItem('bullets_notes', JSON.stringify(notes)); localStorage.setItem('bullets_folders', JSON.stringify(folders)); }
        
        function renderNavigation() {
            if(currentMode==='quick') return;
            navSection.innerHTML = '';
            folders.forEach(f => {
                const active = f.id === currentFolderId;
                const fNotes = notes.filter(n => n.folderId === f.id && n.id !== 'quick_scratchpad');
                const group = document.createElement('div');
                group.className = `folder-group ${active?'active':''}`;
                group.innerHTML = `<div class="folder-header" onclick="switchFolder('${f.id}')"><span class="title">${f.name}</span></div><div class="note-list" id="list-${f.id}">${active?`<div class="note-item" onclick="createNewNote('${f.id}')" style="opacity:0.5;">+ New Record</div>`:''}</div>`;
                navSection.appendChild(group);
                if(active) {
                    const l = document.getElementById(`list-${f.id}`);
                    fNotes.forEach(n => {
                        const ni = document.createElement('div');
                        ni.className = `note-item ${n.id===currentNoteId?'active':''}`;
                        ni.onclick = () => loadNoteData(n.id);
                        ni.innerHTML = `<span class="title">${n.title || 'Untitled'}</span>`;
                        l.appendChild(ni);
                    });
                }
            });
        }

        window.switchFolder = (id) => { currentFolderId = id; localStorage.setItem('bullets_current_folder', id); resumeStandard(); };
        window.createNewNote = (fId) => { currentNoteId = Date.now().toString(); currentFolderId = fId; titleEl.innerText = ''; editor.innerHTML = '<ul><li><br></li></ul>'; editor.focus(); renderNavigation(); };
        function loadNoteData(id) { currentNoteId = id; const n = notes.find(x=>x.id===id); if(n){ titleEl.innerText = n.title; editor.innerHTML = n.content; currentFolderId = n.folderId; } renderNavigation(); }

        function autoSave() {
            if(!currentNoteId) return;
            const t = titleEl.innerText.trim(), c = editor.innerText.trim();
            if(t || c) {
                const data = { id:currentNoteId, folderId:currentFolderId, title:t, content:editor.innerHTML };
                const idx = notes.findIndex(n=>n.id===currentNoteId);
                if(idx === -1) notes.unshift(data); else { notes[idx] = data; }
                saveState(); renderNavigation();
            }
        }
        titleEl.addEventListener('input', autoSave); editor.addEventListener('input', autoSave);
        window.openModal = (id) => document.getElementById(id).classList.add('active');
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');
        window.saveUser = () => { const n = document.getElementById('user-name').value.trim(); if(n){ localStorage.setItem('app_user', JSON.stringify({name:n})); location.reload(); }};
        window.switchUser = () => { document.getElementById('user-name').value = ''; openModal('onboarding'); };
        window.changeTheme = (t) => { document.body.setAttribute('data-theme', t); localStorage.setItem('bullets_theme', t); };
        window.changeFont = (f) => { document.documentElement.style.setProperty('--font-main', f); localStorage.setItem('bullets_font', f); };
        window.confirmCreateFolder = () => { const n = document.getElementById('folder-name').value.trim(); if(n){ const f = {id:Date.now().toString(), name:n}; folders.push(f); saveState(); closeModal('folder-modal'); switchFolder(f.id); }};
    </script>
</body>
</html>
